[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# The Celery worker is deployed as a second Railway service from this same
# repo/Dockerfile, with its start command overridden to
# `celery -A app.services.celery_app worker --loglevel=info` in that
# service's settings — Railway doesn't support two [deploy] blocks in one
# railway.toml, so the worker's command is set via the dashboard/CLI
# instead of here. See docs/ARCHITECTURE.md §7 and the README's deployment
# guide for the exact steps.
