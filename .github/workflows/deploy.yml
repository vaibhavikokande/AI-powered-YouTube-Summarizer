name: Deploy

# Gated behind a repository variable (Settings → Secrets and variables →
# Actions → Variables → ENABLE_DEPLOY = "true"), not just the presence of
# secrets — so this workflow doesn't attempt (and fail) a deployment the
# moment CI/CD is wired up, before you've actually created Railway/Vercel
# projects. See the README's Deployment section for full setup steps.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend + Celery worker to Railway
        working-directory: backend
        run: railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
