name: Docker Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: ai-youtube-summarizer-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: ai-youtube-summarizer-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
